<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="140" viewBox="0 0 1200 140" role="img" aria-label="Contact strip">
  <defs>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#efebda" stroke-opacity="0.08" stroke-width="1" />
    </pattern>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#f14c2f" stop-opacity="0.9" />
      <stop offset="1" stop-color="#f14c2f" stop-opacity="0.25" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="140" rx="18" fill="#393636" />
  <rect width="1200" height="140" rx="18" fill="url(#grid)" />

  <rect x="32" y="22" width="1136" height="3" fill="url(#accent)" />
  <rect x="32" y="115" width="1136" height="3" fill="url(#accent)" />

  <g font-family="Segoe UI, Arial, sans-serif" font-size="14" fill="#efebda" font-weight="600">
    <g>
      <rect x="44" y="46" width="210" height="48" rx="24" fill="#393636" stroke="#f14c2f" stroke-opacity="0.8" />
      <circle cx="72" cy="70" r="8" fill="#f14c2f" filter="url(#glow)" />
      <path d="M 84 70 L 98 70" stroke="#efebda" stroke-width="2" />
      <text x="108" y="75">Netronk Innovations</text>
    </g>

    <g>
      <rect x="270" y="46" width="160" height="48" rx="24" fill="#393636" stroke="#f14c2f" stroke-opacity="0.8" />
      <circle cx="298" cy="70" r="8" fill="#f14c2f" filter="url(#glow)" />
      <path d="M 310 70 L 324 70" stroke="#efebda" stroke-width="2" />
      <text x="334" y="75">Sri Lanka</text>
    </g>

    <g>
      <rect x="446" y="46" width="210" height="48" rx="24" fill="#393636" stroke="#f14c2f" stroke-opacity="0.8" />
      <circle cx="474" cy="70" r="8" fill="#f14c2f" filter="url(#glow)" />
      <path d="M 486 70 L 500 70" stroke="#efebda" stroke-width="2" />
      <text x="510" y="75">luka@netronk.com</text>
    </g>

    <g>
      <rect x="672" y="46" width="140" height="48" rx="24" fill="#393636" stroke="#f14c2f" stroke-opacity="0.8" />
      <circle cx="700" cy="70" r="8" fill="#f14c2f" filter="url(#glow)" />
      <path d="M 712 70 L 726 70" stroke="#efebda" stroke-width="2" />
      <text x="736" y="75">GitHub</text>
    </g>

    <g>
      <rect x="828" y="46" width="140" height="48" rx="24" fill="#393636" stroke="#f14c2f" stroke-opacity="0.8" />
      <circle cx="856" cy="70" r="8" fill="#f14c2f" filter="url(#glow)" />
      <path d="M 868 70 L 882 70" stroke="#efebda" stroke-width="2" />
      <text x="892" y="75">LinkedIn</text>
    </g>
  </g>

  <circle cx="1110" cy="70" r="26" fill="#f14c2f" fill-opacity="0.12" />
  <circle cx="1110" cy="70" r="12" fill="#f14c2f" fill-opacity="0.35" filter="url(#glow)" />
</svg>
